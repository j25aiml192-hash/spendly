  <rect x="18" y="20" width="8" height="20" rx="2" fill="#93C5FD" />
  <rect x="30" y="10" width="8" height="30" rx="2" fill="#BFDBFE" />
  
  <!-- Magnifying glass on right -->
  <!-- Circle -->
